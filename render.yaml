# Render Blueprint — SIGEF frontend (Vite + React) como Static Site.
# Los static sites de Render no tienen cold start y se sirven por CDN.
services:
  - type: web
    name: sigaf-frontend
    runtime: static
    branch: main
    autoDeploy: true
    # yarn install (sin --frozen-lockfile): el yarn.lock está gitignored en este repo.
    buildCommand: yarn install && yarn build
    staticPublishPath: ./dist
    # SPA: cualquier ruta cae a index.html (react-router).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Evita que el script prepare (husky) corra en el build de Render.
      - key: HUSKY
        value: "0"
      # Ajusta a la URL real del backend en Render. El prefijo /api lo pone el
      # backend (global prefix) + versionado /v1 — verifica cómo arma las URLs
      # tu cliente axios y deja aquí la base que espera.
      - key: VITE_API_URL
        value: https://sigaf-backend.onrender.com/api
      - key: VITE_APP_NAME
        value: SIGEF
